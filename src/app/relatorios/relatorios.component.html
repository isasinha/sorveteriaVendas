<div class="page-container">
  <div class="page-header">
    <h1>
      <mat-icon>assessment</mat-icon>
      Relatórios
    </h1>
    <button mat-raised-button (click)="voltar()">
      <mat-icon>arrow_back</mat-icon>
      Voltar
    </button>
  </div>

  @if (podeVerTodasBarracas) {
    <div class="filtro-barraca">
      <mat-icon>store</mat-icon>
      <select [(ngModel)]="barracaFiltro">
        <option value="todas">Todas as barracas</option>
        @for (entry of barracasMap | keyvalue; track entry.key) {
          <option [value]="entry.key">{{ entry.value }}</option>
        }
      </select>
    </div>
  }

  <mat-card>
    <mat-card-content>
      <p>Funcionalidade de Relatórios será implementada aqui.</p>
    </mat-card-content>
  </mat-card>
</div>
