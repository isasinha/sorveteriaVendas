<div class="menu-container">
  <mat-toolbar color="primary" class="toolbar">
    <div class="toolbar-content">
      <div class="toolbar-left">
        <img src="logo_sorveteria_fundo_branco.png" alt="Sorveteria" class="toolbar-logo">
      </div>
      <div class="toolbar-right">
        <span class="user-name">Olá, {{ userName }}! · {{ perfilNome }}</span>
        <button mat-icon-button (click)="onLogout()" title="Sair">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </div>
  </mat-toolbar>

  <div class="content">
    <div class="welcome-section">
      <h1>Bem-vindo ao Sistema de Vendas</h1>
      <p>Selecione uma opção abaixo para começar</p>
    </div>

    <div class="cards-grid">
      @for (item of itensFiltrados; track item.route) {
        <mat-card 
          class="menu-card"
          [style.border-left-color]="item.color"
          (click)="navigateTo(item.route)"
        >
          <mat-card-header>
            <div class="card-icon" [style.background-color]="item.color">
              <mat-icon>{{ item.icon }}</mat-icon>
            </div>
            <mat-card-title>{{ item.title }}</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <p>{{ item.description }}</p>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button [style.color]="item.color">
              Acessar
              <mat-icon>arrow_forward</mat-icon>
            </button>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  </div>
</div>
